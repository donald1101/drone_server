log4j.rootCategory=INFO,stdout,fileLogger

log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=%d  %p  %c:%L - %m%n
#log4j.appender.stdout.encoding=UTF-8

log4j.appender.fileLogger=org.apache.log4j.RollingFileAppender
log4j.appender.fileLogger.layout=org.apache.log4j.PatternLayout
log4j.appender.fileLogger.layout.ConversionPattern=%d  %p  %c:%L - %m%n
log4j.appender.fileLogger.File=logs/DroneServer
log4j.appender.fileLogger.MaxFileSize=1024MB
#log4j.appender.fileLogger.encoding=UTF-8